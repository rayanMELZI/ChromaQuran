name: Deploy to VM

# Ships the source to the server with scp and builds the Docker image there. We pack with
# `git archive`, so ONLY tracked files are sent (no .git / node_modules / .env) — which means
# the server needs NO GitHub credentials or deploy key. Runs on every push to `production`.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   VM_HOST              server IP / hostname
#   VM_USER              SSH user (e.g. deploy)
#   VM_SSH_KEY           private SSH key authorized for VM_USER on the server
#   VM_APP_DIR           absolute deploy dir on the VM (e.g. /home/deploy/chroma-quran)
#   AUTH_JWT_SECRET      long random string for signing session JWTs
#   POSTGRES_PASSWORD    password for the app's Postgres
#   AUTOQURAN_API_URL    (optional) Auto Quran backend URL reachable from the container
#                        (defaults to http://host.docker.internal:5000)
#
# VM_USER just needs to be in the `docker` group. No git setup on the server.

on:
  workflow_dispatch:
  push:
    branches: [production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack tracked source
        run: git archive HEAD | gzip > app.tar.gz

      - name: Copy to the server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: app.tar.gz
          target: /tmp/chroma-quran-deploy

      - name: Unpack, configure & launch
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 30m
          envs: AUTH_JWT_SECRET,POSTGRES_PASSWORD,AUTOQURAN_API_URL
          script: |
            set -e
            APP_DIR="${{ secrets.VM_APP_DIR }}"
            # safety: never operate on an empty or root path
            [ -n "$APP_DIR" ] && [ "$APP_DIR" != "/" ] || { echo "VM_APP_DIR is unsafe: '$APP_DIR'"; exit 1; }

            mkdir -p "$APP_DIR"
            # clean the previous checkout (Docker volumes live outside this dir, so renders/DB
            # survive; .env is rewritten just below), then unpack the freshly-shipped source
            find "$APP_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            tar xzf /tmp/chroma-quran-deploy/app.tar.gz -C "$APP_DIR"
            rm -rf /tmp/chroma-quran-deploy

            cd "$APP_DIR"
            umask 077
            cat > .env <<EOF
            AUTH_JWT_SECRET=${AUTH_JWT_SECRET}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            DATABASE_URL=postgres://chromaquran:${POSTGRES_PASSWORD}@db:5432/chromaquran
            AUTOQURAN_API_URL=${AUTOQURAN_API_URL:-http://host.docker.internal:5000}
            NODE_ENV=production
            EOF

            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
            docker compose -f docker-compose.prod.yml ps
        env:
          AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AUTOQURAN_API_URL: ${{ secrets.AUTOQURAN_API_URL }}
