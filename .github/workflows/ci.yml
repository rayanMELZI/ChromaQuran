name: CI

on:
  push:
    branches: [main, production]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # CI only typechecks/builds — no need to download the Chromium browser binary.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
